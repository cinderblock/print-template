name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format check
        run: bun run fmt:check

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run tests
        run: bun run test --project=chromium

      - name: Type check
        run: bun run typecheck

      - name: Build (project subpath)
        run: bun run build
        env:
          BASE_PATH: /print-template/

      # React Router emits prerendered pages under the basename dir; flatten them
      # to the artifact root so the project page serves correctly at /print-template/.
      - name: Assemble Pages artifact
        run: |
          rm -rf _site && mkdir _site
          cp -r build/client/print-template/* _site/
          cp -r build/client/assets _site/assets
          cp build/client/index.html _site/404.html   # SPA fallback for unknown paths
          cp build/client/*.svg _site/ 2>/dev/null || true
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
